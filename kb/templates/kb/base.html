<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDFナレッジベース{% endblock %}</title>
    <!-- HTMX CDN: 検索結果の部分更新に使用（ページ全体リロード不要） -->
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem 2rem;
            color: #333;
        }
        nav {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #ddd;
            margin-bottom: 2rem;
        }
        nav a {
            text-decoration: none;
            color: #555;
        }
        nav a:hover {
            color: #000;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <strong>PDFナレッジベース</strong>
        {% url 'kb:upload' as upload_url %}{% if upload_url %}<a href="{{ upload_url }}">アップロード</a>{% endif %}
        {% url 'kb:search' as search_url %}{% if search_url %}<a href="{{ search_url }}">検索</a>{% endif %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
