<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ナレッジベース エージェント</title>
    <link rel="stylesheet" href="css/chat.css" />
  </head>
  <body>
    <header>
      <span class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6L12 2z"/>
        </svg>
      </span>
      <h1>ナレッジベース エージェント</h1>
    </header>

    <div class="chat-area" id="chat-area">
      <!-- アクティブ時: メッセージ一覧（CSS で初期非表示） -->
      <div id="messages">
        <div class="messages-inner" id="messages-inner"></div>
      </div>

      <!-- 初期ランディング: ウェルカム ＋ 入力欄を中央に束ねる -->
      <div class="landing" id="landing">
        <div class="welcome">
          <div class="big-logo">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2l1.6 6.4L20 10l-6.4 1.6L12 18l-1.6-6.4L4 10l6.4-1.6L12 2z"/>
            </svg>
          </div>
          <h2>こんにちは</h2>
          <p>今日は何を探していますか？</p>
        </div>

        <!-- 入力欄は初期状態ここに置く。送信後に chat-area 直下へ移動する -->
        <div class="composer-wrap" id="composer-wrap">
          <form id="chat-form">
            <textarea
              id="q"
              rows="1"
              placeholder="質問を入力してください…"
              autocomplete="off"
            ></textarea>
            <button type="submit" id="send" aria-label="送信">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 19V5M5 12l7-7 7 7"/>
              </svg>
            </button>
          </form>
          <p class="hint">Enter で送信 / Shift + Enter で改行</p>
        </div>
      </div>
    </div>

    <script src="js/chat.js"></script>
  </body>
</html>
