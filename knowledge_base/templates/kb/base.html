<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PDFナレッジベース{% endblock %}</title>
    <!-- HTMX CDN: 検索結果の部分更新に使用（ページ全体リロード不要） -->
    <script src="https://unpkg.com/htmx.org@2.0.3" defer></script>
    <style>
        /* ===== デザイントークン（配色・余白・角丸を一元管理） ===== */
        :root {
            --bg: #f4f5f7;
            --surface: #ffffff;
            --border: #e2e5ea;
            --text: #1f2430;
            --text-muted: #6b7280;
            --accent: #4f46e5;       /* インディゴ系のアクセント */
            --accent-hover: #4338ca;
            --accent-soft: #eef2ff;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --success: #16a34a;
            --warning: #d97706;
            --radius: 10px;
            --radius-sm: 6px;
            --shadow: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
            --shadow-md: 0 4px 16px rgba(16, 24, 40, 0.08);
        }

        * { box-sizing: border-box; }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
            margin: 0;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== ナビゲーションバー ===== */
        .site-header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
        nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            max-width: 920px;
            margin: 0 auto;
            padding: 0.9rem 2rem;
        }
        nav .brand {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-right: auto;
        }
        nav .brand .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.9rem;
            height: 1.9rem;
            border-radius: var(--radius-sm);
            background: var(--accent);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 700;
        }
        nav a.nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.4rem 0.85rem;
            border-radius: var(--radius-sm);
            transition: background 0.15s ease, color 0.15s ease;
        }
        nav a.nav-link:hover {
            color: var(--accent);
            background: var(--accent-soft);
        }

        /* ===== メインコンテナ ===== */
        main {
            max-width: 920px;
            margin: 2.5rem auto;
            padding: 0 2rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 0 0 1.5rem;
            letter-spacing: -0.01em;
        }

        /* ===== カード（フォームや結果を載せる白い面） ===== */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.75rem;
        }

        /* ===== フォーム共通スタイル ===== */
        .form .field {
            margin-bottom: 1.25rem;
        }
        .form label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.45rem;
        }
        .form input[type="text"],
        .form input[type="search"],
        .form input[type="file"],
        .form select,
        .form textarea {
            width: 100%;
            padding: 0.6rem 0.75rem;
            font-size: 0.95rem;
            font-family: inherit;
            color: var(--text);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: border-color 0.15s ease, box-shadow 0.15s ease;
        }
        .form input[type="text"]:focus,
        .form input[type="search"]:focus,
        .form select:focus,
        .form textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        /* ファイル選択ボタンの体裁を整える */
        .form input[type="file"] {
            padding: 0.5rem;
            cursor: pointer;
        }
        .form input[type="file"]::file-selector-button {
            margin-right: 0.85rem;
            padding: 0.45rem 0.9rem;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
            background: var(--accent-soft);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .form input[type="file"]::file-selector-button:hover {
            background: #e0e7ff;
        }
        .form small {
            display: block;
            margin-top: 0.4rem;
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        /* ===== ボタン ===== */
        button[type="submit"],
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background 0.15s ease, transform 0.05s ease;
        }
        button[type="submit"]:hover,
        .btn:hover {
            background: var(--accent-hover);
        }
        button[type="submit"]:active,
        .btn:active {
            transform: translateY(1px);
        }

        /* ===== エラーメッセージ ===== */
        .error-messages {
            background: var(--danger-soft);
            border: 1px solid #fecaca;
            border-radius: var(--radius-sm);
            padding: 0.85rem 1rem;
            margin-bottom: 1.25rem;
        }
        .error,
        .field-error {
            color: var(--danger);
            font-size: 0.88rem;
            margin: 0.25rem 0;
        }
        .field-error {
            margin-top: 0.4rem;
        }

        /* ===== 検索結果リスト ===== */
        .search-results {
            list-style: none;
            padding: 0;
            margin: 1.75rem 0 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .search-result-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: var(--radius-sm);
            padding: 1.1rem 1.25rem;
            box-shadow: var(--shadow);
        }
        .chunk-content {
            margin: 0 0 0.65rem;
            color: var(--text);
        }
        .chunk-source {
            display: inline-block;
            font-size: 0.82rem;
            color: var(--text-muted);
            background: var(--bg);
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
        }
        .no-results {
            margin-top: 1.75rem;
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px dashed var(--border);
            border-radius: var(--radius);
        }

        /* ===== ドキュメント詳細（定義リスト） ===== */
        .detail-list {
            margin: 0;
        }
        .detail-list dt {
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            margin-top: 1.1rem;
        }
        .detail-list dt:first-child {
            margin-top: 0;
        }
        .detail-list dd {
            margin: 0.3rem 0 0;
            font-size: 1rem;
        }
        .detail-list a {
            color: var(--accent);
            font-weight: 500;
        }

        /* ===== ステータスバッジ ===== */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.25rem 0.7rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-radius: 999px;
        }
        .badge::before {
            content: "";
            width: 0.5rem;
            height: 0.5rem;
            border-radius: 50%;
            background: currentColor;
        }
        .badge-processing { color: var(--warning); background: #fffbeb; }
        .badge-complete   { color: var(--success); background: #f0fdf4; }
        .badge-failed     { color: var(--danger);  background: var(--danger-soft); }
        .badge-pending    { color: var(--text-muted); background: var(--bg); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <nav>
            <span class="brand"><span class="logo">KB</span>PDFナレッジベース</span>
            {% url 'knowledge_base:upload' as upload_url %}{% if upload_url %}<a class="nav-link" href="{{ upload_url }}">アップロード</a>{% endif %}
            {% url 'knowledge_base:search' as search_url %}{% if search_url %}<a class="nav-link" href="{{ search_url }}">検索</a>{% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
